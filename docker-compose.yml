version: "3.9"

services:
  bot:
    build: .
    container_name: ad_optimizer_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Постоянное хранилище данных — сохраняется между перезапусками
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
